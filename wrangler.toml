name = "sandbox-sdk-issue-794"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Matches how @cloudflare/sandbox is run in production (streaming-capable transport).
[vars]
SANDBOX_TRANSPORT = "rpc"
# The container exit code / stop reason live only inside the Sandbox DO, and the SDK records them
# via a debug-level log in onStop() ("Sandbox stopped", { exitCode, reason }). The default level is
# "info", which suppresses it. Set debug so that log fires; read it via `wrangler tail` or Workers
# Logs (it is NOT on the error that reaches the Worker: DO->Worker RPC strips the error's context).
SANDBOX_LOG_LEVEL = "debug"

# Container-backed Durable Object. `instance_type = basic` (1/4 vCPU, 1 GiB) and a low
# `max_instances` keep the repro nowhere near any account cap — the failure is about
# *concurrent starts*, not capacity.
[[containers]]
class_name = "Sandbox"
image = "./Dockerfile"
instance_type = "basic"
max_instances = 100

[[durable_objects.bindings]]
class_name = "Sandbox"
name = "Sandbox"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Sandbox"]

# The Sandbox SDK writes snapshots here when createBackup({ localBucket: true }) is used
# (snapshot_workspace / create_workspace with a snapshotId). The binding name MUST be
# BACKUP_BUCKET — the SDK looks it up by that name. Create it once:
#   npx wrangler r2 bucket create sandbox-sdk-issue-794-backups
[[r2_buckets]]
binding = "BACKUP_BUCKET"
bucket_name = "sandbox-sdk-issue-794-backups"

[observability]
enabled = true
# Persisted traces surface the *real* per-request failure (e.g. "there is no container instance
# that can be provided to this durable object"). Group by run_id / run_instance_id in the trace UI.
traces = { enabled = true, persist = true }
